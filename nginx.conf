pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {

    include /etc/nginx/mime.types;

    server {
        listen 8080;

        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            include /etc/nginx/security-headers.conf;
        }

        # Cache static assets
        location ~* \.(?:css|js|jpg|svg|png|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            include /etc/nginx/security-headers.conf;
        }

        # Handle robots.txt and sitemap.xml separately if they exist, or they fall under location / but we don't want no-store for them necessarily. Actually, it's fine.
        location = /robots.txt {
            add_header Cache-Control "public, max-age=86400";
            include /etc/nginx/security-headers.conf;
            try_files $uri =404;
        }

        location = /sitemap.xml {
            add_header Cache-Control "public, max-age=86400";
            include /etc/nginx/security-headers.conf;
            try_files $uri =404;
        }
    }
}